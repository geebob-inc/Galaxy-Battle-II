<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Galaxy Battle X</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
    color:white;
    text-align:center;
}

canvas{
    display:block;
    margin:auto;
    background:#050816;
    border:3px solid cyan;
    box-shadow:0 0 30px cyan;
}

h1{
    color:cyan;
    text-shadow:0 0 20px cyan;
}

a{
    color:lime;
    font-size:18px;
}

#menu{
    position:absolute;
    width:100%;
    top:40%;
    left:50%;
    transform:translate(-50%,-50%);
}

button{
    padding:12px 30px;
    font-size:20px;
    background:cyan;
    border:none;
    cursor:pointer;
    font-weight:bold;
    border-radius:10px;
}
</style>
</head>

<body>

<a href="https://geebob-inc.github.io/main-page" target="_blank">
Check out more from Geebob Inc. here
</a>

<h1>⚔ Galaxy Battle X ⚔</h1>

<div id="menu">
    <h2>Defend the Galaxy</h2>
    <button onclick="startGame()">START GAME</button>
</div>

<canvas id="gameCanvas" width="1000" height="550"></canvas>

<script>

/* ================= CANVAS ================= */
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

/* ================= AUDIO ================= */
const AC=new(window.AudioContext||window.webkitAudioContext)();

function playSound(type){

    const o=AC.createOscillator();
    const g=AC.createGain();

    o.connect(g);
    g.connect(AC.destination);

    if(type=="laser"){
        o.type="square";
        o.frequency.value=700;
        g.gain.value=0.05;
    }

    if(type=="boom"){
        o.type="sawtooth";
        o.frequency.value=120;
        g.gain.value=0.1;
    }

    o.start();
    o.stop(AC.currentTime+0.1);
}

/* ================= PLAYER ================= */
class Player{
    constructor(){
        this.x=canvas.width/2;
        this.y=canvas.height-80;
        this.radius=22;
        this.speed=5;
        this.hp=100;
        this.bullets=[];
        this.lastShot=0;
    }

    draw(){
        ctx.save();

        ctx.translate(this.x,this.y);

        ctx.shadowBlur=30;
        ctx.shadowColor="cyan";

        let g=ctx.createLinearGradient(0,-30,0,30);
        g.addColorStop(0,"white");
        g.addColorStop(0.5,"cyan");
        g.addColorStop(1,"blue");

        ctx.fillStyle=g;

        ctx.beginPath();
        ctx.moveTo(0,-25);
        ctx.lineTo(-20,20);
        ctx.lineTo(0,10);
        ctx.lineTo(20,20);
        ctx.closePath();
        ctx.fill();

        ctx.restore();
    }
}

/* ================= BULLET ================= */
class Bullet{
    constructor(x,y){
        this.x=x;
        this.y=y;
        this.radius=4;
        this.speed=9;
    }

    update(){
        this.y-=this.speed;
    }

    draw(){
        ctx.fillStyle="yellow";
        ctx.shadowBlur=20;
        ctx.shadowColor="yellow";

        ctx.beginPath();
        ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
        ctx.fill();
    }
}

/* ================= ENEMY ================= */
class Enemy{
    constructor(){
        this.x=Math.random()*canvas.width;
        this.y=-40;
        this.radius=18;
        this.speed=2+Math.random()*2;
        this.hp=2;
    }

    update(){
        this.y+=this.speed;
    }

    draw(){
        ctx.save();

        ctx.translate(this.x,this.y);

        ctx.shadowBlur=25;
        ctx.shadowColor="red";

        let g=ctx.createRadialGradient(0,0,2,0,0,25);
        g.addColorStop(0,"white");
        g.addColorStop(0.3,"red");
        g.addColorStop(1,"darkred");

        ctx.fillStyle=g;

        ctx.beginPath();
        ctx.moveTo(0,-20);
        ctx.lineTo(-20,0);
        ctx.lineTo(0,20);
        ctx.lineTo(20,0);
        ctx.closePath();
        ctx.fill();

        ctx.restore();
    }
}

/* ================= STARS ================= */
let stars=[];

function createStars(){
    stars=[];
    for(let i=0;i<300;i++){
        stars.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height,
            s:Math.random()*3
        });
    }
}

function drawStars(){

    ctx.fillStyle="#050816";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for(let s of stars){

        ctx.fillStyle="white";
        ctx.fillRect(s.x,s.y,s.s,s.s);

        s.y+=s.s;

        if(s.y>canvas.height){
            s.y=0;
            s.x=Math.random()*canvas.width;
        }
    }
}

/* ================= GAME ================= */
let player=new Player();
let enemies=[];
let score=0;
let gameOver=false;
let running=false;

const keys={};

document.addEventListener("keydown",e=>{
    keys[e.key]=true;
});

document.addEventListener("keyup",e=>{
    keys[e.key]=false;
});

/* ================= START ================= */
function startGame(){
    document.getElementById("menu").style.display="none";

    createStars();

    running=true;

    gameLoop();
}

/* ================= SPAWN ENEMIES ================= */
function spawnEnemy(){

    if(Math.random()<0.03){
        enemies.push(new Enemy());
    }
}

/* ================= PLAYER MOVEMENT ================= */
function movePlayer(){

    if(keys["a"]) player.x-=player.speed;
    if(keys["d"]) player.x+=player.speed;
    if(keys["w"]) player.y-=player.speed;
    if(keys["s"]) player.y+=player.speed;

    player.x=Math.max(20,Math.min(canvas.width-20,player.x));
    player.y=Math.max(20,Math.min(canvas.height-20,player.y));
}

/* ================= SHOOT ================= */
function shoot(){

    let now=Date.now();

    if(keys[" "] && now-player.lastShot>150){

        player.bullets.push(new Bullet(player.x,player.y-20));

        player.lastShot=now;

        playSound("laser");
    }
}

/* ================= UPDATE BULLETS ================= */
function updateBullets(){

    for(let i=player.bullets.length-1;i>=0;i--){

        let b=player.bullets[i];

        b.update();
        b.draw();

        if(b.y<0){
            player.bullets.splice(i,1);
        }
    }
}

/* ================= UPDATE ENEMIES ================= */
function updateEnemies(){

    for(let i=enemies.length-1;i>=0;i--){

        let e=enemies[i];

        e.update();
        e.draw();

        // PLAYER HIT
        if(Math.hypot(player.x-e.x,player.y-e.y)<35){

            player.hp-=20;

            enemies.splice(i,1);

            playSound("boom");

            if(player.hp<=0){
                gameOver=true;
            }
        }

        // BULLET HIT
        for(let j=player.bullets.length-1;j>=0;j--){

            let b=player.bullets[j];

            if(Math.hypot(b.x-e.x,b.y-e.y)<20){

                e.hp--;

                player.bullets.splice(j,1);

                if(e.hp<=0){

                    enemies.splice(i,1);

                    score+=10;

                    playSound("boom");
                }

                break;
            }
        }

        if(e.y>canvas.height+40){
            enemies.splice(i,1);
        }
    }
}

/* ================= HUD ================= */
function drawHUD(){

    ctx.fillStyle="cyan";
    ctx.font="22px Arial";

    ctx.fillText("Score: "+score,20,30);
    ctx.fillText("HP: "+player.hp,20,60);
    ctx.fillText("Enemies: "+enemies.length,20,90);

    ctx.fillStyle="white";
    ctx.font="16px Arial";
    ctx.fillText("WASD = Move | SPACE = Shoot",20,120);
}

/* ================= GAME OVER ================= */
function drawGameOver(){

    ctx.fillStyle="rgba(0,0,0,0.7)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="red";
    ctx.font="50px Arial";
    ctx.fillText("GAME OVER",canvas.width/2-170,canvas.height/2-20);

    ctx.fillStyle="white";
    ctx.font="28px Arial";
    ctx.fillText("Final Score: "+score,canvas.width/2-100,canvas.height/2+40);

    ctx.font="20px Arial";
    ctx.fillText("Press R to Restart",canvas.width/2-90,canvas.height/2+90);
}

/* ================= RESTART ================= */
document.addEventListener("keydown",e=>{

    if(e.key=="r" && gameOver){

        player=new Player();

        enemies=[];

        score=0;

        gameOver=false;
    }
});

/* ================= MAIN LOOP ================= */
function gameLoop(){

    if(!running) return;

    requestAnimationFrame(gameLoop);

    drawStars();

    if(!gameOver){

        movePlayer();

        shoot();

        spawnEnemy();

        player.draw();

        updateBullets();

        updateEnemies();

        drawHUD();

    } else {

        drawGameOver();
    }
}

</script>

<p style="color:cyan;">A Geebob Inc. Production</p>

</body>
</html>
</html>
