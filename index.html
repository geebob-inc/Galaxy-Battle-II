<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Moonwalk Simulator</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        font-family: Arial, sans-serif;
    }

    canvas {
        display: block;
    }

    .hud {
        position: absolute;
        top: 15px;
        left: 15px;
        color: white;
        background: rgba(0,0,0,0.5);
        padding: 12px;
        border-radius: 10px;
        line-height: 1.6;
    }
</style>
</head>
<body>

<div class="hud">
    <b>Moonwalk Simulator</b><br>
    WASD = Move<br>
    Mouse = Look Around<br>
    Space = Jump<br>
    Shift = Sprint
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

let keys = {};

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// PLAYER
const player = {
    x: 0,
    y: 1.8,
    z: 0,
    velY: 0,
    rotY: 0,
    speed: 0.08,
    jumping: false
};

// MOUSE LOOK
canvas.addEventListener("click", () => {
    canvas.requestPointerLock();
});

document.addEventListener("mousemove", e => {
    if (document.pointerLockElement === canvas) {
        player.rotY += e.movementX * 0.002;
    }
});

// STARS
const stars = [];
for (let i = 0; i < 300; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2
    });
}

// ROCKS
const rocks = [];
for (let i = 0; i < 80; i++) {
    rocks.push({
        x: (Math.random() - 0.5) * 120,
        z: (Math.random() - 0.5) * 120,
        size: Math.random() * 2 + 1
    });
}

// SIMPLE 3D PROJECTION
function project(x, y, z) {
    const dx = x - player.x;
    const dz = z - player.z;

    const sin = Math.sin(-player.rotY);
    const cos = Math.cos(-player.rotY);

    const rx = dx * cos - dz * sin;
    const rz = dx * sin + dz * cos;

    if (rz <= 0.1) return null;

    const scale = 500 / rz;

    return {
        x: canvas.width / 2 + rx * scale,
        y: canvas.height / 2 + y * scale,
        scale
    };
}

// DRAW SKY
function drawSky() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";
    for (const s of stars) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
    }
}

// DRAW GROUND
function drawGround() {
    ctx.fillStyle = "#666";
    ctx.beginPath();
    ctx.moveTo(0, canvas.height / 2);
    ctx.lineTo(canvas.width, canvas.height / 2);
    ctx.lineTo(canvas.width, canvas.height);
    ctx.lineTo(0, canvas.height);
    ctx.fill();

    // Ground lines
    ctx.strokeStyle = "#777";

    for (let z = 2; z < 100; z += 2) {
        const p1 = project(-50, 1, z + player.z);
        const p2 = project(50, 1, z + player.z);

        if (p1 && p2) {
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
        }
    }
}

// DRAW ROCKS
function drawRocks() {
    for (const rock of rocks) {
        const p = project(rock.x, 1, rock.z);

        if (!p) continue;

        const size = rock.size * p.scale;

        ctx.fillStyle = "#888";

        ctx.beginPath();
        ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
        ctx.fill();
    }
}

// DRAW EARTH
function drawEarth() {
    ctx.beginPath();
    ctx.arc(canvas.width - 180, 140, 90, 0, Math.PI * 2);

    const grad = ctx.createRadialGradient(
        canvas.width - 210,
        110,
        20,
        canvas.width - 180,
        140,
        90
    );

    grad.addColorStop(0, "#4fc3f7");
    grad.addColorStop(1, "#0d47a1");

    ctx.fillStyle = grad;
    ctx.fill();
}

// CROSSHAIR
function drawCrosshair() {
    ctx.strokeStyle = "white";

    ctx.beginPath();
    ctx.moveTo(canvas.width/2 - 10, canvas.height/2);
    ctx.lineTo(canvas.width/2 + 10, canvas.height/2);

    ctx.moveTo(canvas.width/2, canvas.height/2 - 10);
    ctx.lineTo(canvas.width/2, canvas.height/2 + 10);

    ctx.stroke();
}

// MOVEMENT
function update() {

    let moveSpeed = keys["shift"] ? 0.14 : player.speed;

    let dx = 0;
    let dz = 0;

    if (keys["w"]) dz += moveSpeed;
    if (keys["s"]) dz -= moveSpeed;
    if (keys["a"]) dx -= moveSpeed;
    if (keys["d"]) dx += moveSpeed;

    player.x += Math.sin(player.rotY) * dz;
    player.z += Math.cos(player.rotY) * dz;

    player.x += Math.sin(player.rotY + Math.PI/2) * dx;
    player.z += Math.cos(player.rotY + Math.PI/2) * dx;

    // Moon gravity jump
    if (keys[" "] && !player.jumping) {
        player.velY = 0.22;
        player.jumping = true;
    }

    player.velY -= 0.008; // low moon gravity
    player.y += player.velY;

    if (player.y < 1.8) {
        player.y = 1.8;
        player.velY = 0;
        player.jumping = false;
    }
}

// BOBBING
function cameraBob() {
    return Math.sin(Date.now() * 0.01) * 2;
}

// MAIN LOOP
function loop() {

    update();

    drawSky();
    drawGround();
    drawRocks();
    drawEarth();

    drawCrosshair();

    // Horizon shift from jump
    ctx.save();
    ctx.translate(0, cameraBob() - player.y * 10);
    ctx.restore();

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
